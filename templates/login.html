<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>有料ai</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1e1e1e;
            color: #fff;
            font-family: sans-serif;
        }

        /* 1. 右上角登录按钮 */
        .login-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(30,30,30,0.8);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: rgba(50,50,50,0.9);
        }

        /* 2. 登录弹窗容器（默认隐藏） */
        .login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
        }

        /* 3. 半透明背景遮罩 */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        /* 4. 登录内容框（居中） */
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(40,40,40,0.9);
            border-radius: 12px;
            padding: 30px;
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 关闭按钮 */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            cursor: pointer;
        }

        /* 二维码生成中提示 */
        .qr-loading {
            margin: 30px 0;
            padding: 60px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- 1. 右上角登录按钮 -->
    <button class="login-btn" id="openLoginBtn">登入</button>

    <!-- 2. 登录弹窗 -->
    <div class="login-modal" id="loginModal">
        <!-- 半透明遮罩 -->
        <div class="modal-overlay" id="modalOverlay"></div>
        <!-- 登录内容框 -->
        <div class="modal-content">
            <button class="close-btn" id="closeLoginBtn">×</button>
            <h3>微信扫码登录</h3>
            <div class="qr-loading">
                二维码生成中...
            </div>
            <p style="font-size: 12px; color: #aaa;">
                （安全）微信扫码登录解锁：账号每日10次下载、壁纸收藏、社区互动...
            </p>
        </div>
    </div>

    <script>
        // 获取元素
        const openBtn = document.getElementById('openLoginBtn');
        const closeBtn = document.getElementById('closeLoginBtn');
        const overlay = document.getElementById('modalOverlay');
        const modal = document.getElementById('loginModal');

        // 打开弹窗
        openBtn.addEventListener('click', () => {
            modal.style.display = 'block';
        });

        // 关闭弹窗（按钮、遮罩点击都可以关）
        function closeModal() {
            modal.style.display = 'none';
        }
        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', closeModal);
    </script>
</body>
</html>
