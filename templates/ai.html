<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>有料ai</title>
    <style></style>
    <link rel="stylesheet" href="../static/css/page_chat.css">
    <link rel="icon" href="../static/a.ico" type="image/x-icon">
</head>
<body>
<div style="display: flex; gap: 20px;">
    <div class="sidebar" id="sideBar">
        <div class="history">
            历史会话
        </div>
<!--    <div title="Tue May 26 2026 03:07:33 GMT+0800 (中国标准时间)" class="history title">dw</div>-->

    </div>  <!-- 左边 -->
    <div class="chat-whole" style="flex:1;">
        <div class="chat-box" id="chatBox">
            <div class="chat-box-title" id="chatBoxTitle">
                <div style="display: flex;gap: 8px;">
                    <button class="fold-btn" onclick="foldHistorySession()" title="折叠/展开侧边栏">
                        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor"
                             stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>

                    <button class="new-btn" onclick="createNewSession()" title="新建对话">
                        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor"
                             stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="chat-session" id="chatSession"></div>
            </div>
<!--        <div class="message user"></div>-->
<!--        <div class="message ai"></div>-->
        </div>
        <div class="input-box">
            <label for="userInput"></label><input type="text" id="userInput" placeholder="输入你的问题..."
                                                  autocomplete="off">
            <button onclick="sendMessage()" id="sendMessage" class="button-sendMessage">发送🪄</button>
        </div>
    </div> <!-- 右边 -->
</div>
<script src="../static/js/page_chat.js"></script>
</body>
</html>
